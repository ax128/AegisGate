# CLIProxyAPI 代理优化栈（按需启用）：
# 1) 启动命令：
#    docker compose -f docker-compose.yml -f docker-compose.cliproxy.yml up -d --build
# 2) 关闭命令：
#    docker compose -f docker-compose.yml -f docker-compose.cliproxy.yml down
#
# 链路：
#   api.example.com -> Caddy -> AegisGate -> cli-proxy-api:8317

services:
  aegisgate:
    environment:
      # CLIProxyAPI v1 路由（务必带 /v1，保证 /v1/chat/completions 等路径兼容）
      AEGIS_UPSTREAM_BASE_URL: "http://cli-proxy-api:8317/v1"
      # Caddy 容器 IP 作为可信代理，使 X-Forwarded-For/Host/Proto 被正确识别。
      # 支持 CIDR：172.16.0.0/12 覆盖 Docker 默认网段；也可设为具体 IP。
      AEGIS_TRUSTED_PROXY_IPS: "${AEGIS_TRUSTED_PROXY_IPS:-172.16.0.0/12}"
      # 大流量/长上下文/流式传输建议参数
      AEGIS_ENABLE_THREAD_OFFLOAD: "true"
      AEGIS_FILTER_PIPELINE_TIMEOUT_S: "90"
      AEGIS_UPSTREAM_TIMEOUT_SECONDS: "600"
      AEGIS_UPSTREAM_MAX_CONNECTIONS: "300"
      AEGIS_UPSTREAM_MAX_KEEPALIVE_CONNECTIONS: "100"
      AEGIS_MAX_REQUEST_BODY_BYTES: "12000000"
      AEGIS_MAX_MESSAGES_COUNT: "300"
      AEGIS_MAX_CONTENT_LENGTH_PER_MESSAGE: "250000"
      AEGIS_MAX_PENDING_PAYLOAD_BYTES: "1200000"
      AEGIS_MAX_RESPONSE_LENGTH: "2000000"
    depends_on:
      - cli-proxy-api

  caddy:
    image: caddy:2-alpine
    container_name: aegisgate-caddy
    entrypoint: ["/bin/sh", "/scripts/caddy-entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./scripts/caddy-entrypoint.sh:/scripts/caddy-entrypoint.sh:ro
      - ./config:/config:ro
      - ./www:/srv/www
      - caddy_data:/data
      - caddy_config:/caddy_config
    restart: unless-stopped
    depends_on:
      - aegisgate
      - cli-proxy-api

  # CLIProxyAPI：从本地 ./CLIProxyAPI/ 源码构建
  # 更新：git -C ./CLIProxyAPI pull
  cli-proxy-api:
    build:
      context: ./CLIProxyAPI
      dockerfile: Dockerfile
    image: cli-proxy-api:local
    container_name: cli-proxy-api
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "127.0.0.1:8317:8317"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./CLIProxyAPI/config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./CLIProxyAPI/auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./CLIProxyAPI/logs}:/CLIProxyAPI/logs
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
