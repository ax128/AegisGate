<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AegisGate — 管理登录</title>
    <link rel="stylesheet" href="/__ui__/assets/app.css">
    <script>
      (function() {
        var savedTheme = localStorage.getItem('aegisgate_theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body class="login-page">
    <button id="theme-toggle" class="btn-hdr btn-theme-float" type="button" title="切换主题">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <main class="login-shell">
      <section class="login-card">
        <div class="login-logo">
          <!-- shield icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="login-brand">AegisGate</div>
        <p class="login-subtitle">本地管理控制台</p>

        <div class="login-divider"></div>

        <form id="login-form" class="login-form">
          <div>
            <label class="field-label" for="password-input">网关密钥</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input
                id="password-input"
                type="password"
                class="field-input"
                autocomplete="current-password"
                placeholder="AEGIS_GATEWAY_KEY"
                autofocus
              >
            </div>
          </div>
          <button type="submit" class="btn-login">登 录</button>
          <div id="login-error" class="login-error"></div>
        </form>

        <div class="login-notice">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          仅允许内网访问 · 使用 <code>AEGIS_GATEWAY_KEY</code> 作为密码 · 登录后可查看配置与文档
        </div>
      </section>
    </main>
    <script src="/__ui__/assets/login.js"></script>
  </body>
</html>
