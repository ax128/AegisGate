# AIClient-2-API 附加栈（与 CLIProxyAPI / Sub2API 等其他上游共存）：
#
# 使用方式（叠加到已有 compose 配置）：
#   docker compose -f docker-compose.yml -f docker-compose.cliproxy.yml -f docker-compose.aiclient2api.yml up -d --build
#
# 单独使用（AIClient-2-API 作为唯一上游）：
#   docker compose -f docker-compose.yml -f docker-compose.aiclient2api.yml up -d --build
#   此时需在 .env 中设置 AEGIS_UPSTREAM_BASE_URL=http://aiclient2api:3000/v1
#
# 与其他上游共存时：
#   AIClient-2-API 通过 Token 路由接入，不覆盖 AEGIS_UPSTREAM_BASE_URL。
#   启动后注册 token：
#     curl -X POST http://127.0.0.1:18080/__gw__/register \
#       -H "Content-Type: application/json" \
#       -d '{"upstream_base":"http://aiclient2api:3000/v1","api_key":"<apikey>"}'
#   返回的 token 用于请求路径：/v1/__gw__/t/<TOKEN>/chat/completions
#
# 链路（Token 路由模式）：
#   客户端 → AegisGate /v1/__gw__/t/<TOKEN>/... → aiclient2api:3000
#
# 链路（直连模式，单独使用时）：
#   客户端 → Caddy → AegisGate → aiclient2api:3000

services:
  aegisgate:
    depends_on:
      aiclient2api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # AIClient-2-API：使用官方镜像
  # 官方文档：https://github.com/justlovemaki/AIClient-2-API
  # 更新：docker compose -f ... pull aiclient2api && docker compose -f ... up -d
  # ---------------------------------------------------------------------------
  aiclient2api:
    image: justlikemaki/aiclient-2-api:latest
    container_name: aiclient2api
    restart: unless-stopped
    ports:
      # Web UI 管理界面（仅本机访问）
      - "127.0.0.1:3000:3000"
      # OAuth 回调端口（Gemini / Antigravity / Codex / Kiro）
      - "8085-8087:8085-8087"
      - "1455:1455"
      - "19876-19880:19876-19880"
    volumes:
      - ./aiclient2api/configs:/app/configs
    environment:
      - ARGS=${AICLIENT2API_ARGS:-}
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
