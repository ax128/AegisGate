# Sub2API 代理栈（按需启用）：
# 1) 启动命令：
#    docker compose -f docker-compose.yml -f docker-compose.sub2api.yml up -d --build
# 2) 关闭命令：
#    docker compose -f docker-compose.yml -f docker-compose.sub2api.yml down
#
# 链路：
#   api.example.com -> Caddy -> AegisGate -> sub2api:8080

services:
  aegisgate:
    environment:
      # Sub2API 上游（带 /v1，保证 /v1/messages 等路径兼容）
      AEGIS_UPSTREAM_BASE_URL: "http://sub2api:8080/v1"
      # Caddy 容器 IP 作为可信代理，使 X-Forwarded-For/Host/Proto 被正确识别。
      # 支持 CIDR：172.16.0.0/12 覆盖 Docker 默认网段；也可设为具体 IP。
      AEGIS_TRUSTED_PROXY_IPS: "${AEGIS_TRUSTED_PROXY_IPS:-172.16.0.0/12}"
      # 大流量/长上下文/流式传输建议参数
      AEGIS_ENABLE_THREAD_OFFLOAD: "true"
      AEGIS_FILTER_PIPELINE_TIMEOUT_S: "90"
      AEGIS_UPSTREAM_TIMEOUT_SECONDS: "600"
      AEGIS_UPSTREAM_MAX_CONNECTIONS: "300"
      AEGIS_UPSTREAM_MAX_KEEPALIVE_CONNECTIONS: "100"
      AEGIS_MAX_REQUEST_BODY_BYTES: "12000000"
      AEGIS_MAX_MESSAGES_COUNT: "300"
      AEGIS_MAX_CONTENT_LENGTH_PER_MESSAGE: "250000"
      AEGIS_MAX_PENDING_PAYLOAD_BYTES: "1200000"
      AEGIS_MAX_RESPONSE_LENGTH: "2000000"
    depends_on:
      sub2api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: aegisgate-caddy
    entrypoint: ["/bin/sh", "/scripts/caddy-entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./scripts/caddy-entrypoint.sh:/scripts/caddy-entrypoint.sh:ro
      - ./config:/config:ro
      - ./www:/srv/www
      - caddy_data:/data
      - caddy_config:/caddy_config
    restart: unless-stopped
    depends_on:
      - aegisgate
      - sub2api

  # ---------------------------------------------------------------------------
  # Sub2API：使用官方镜像
  # 更新：docker compose -f ... pull sub2api && docker compose -f ... up -d
  # ---------------------------------------------------------------------------
  sub2api:
    image: weishaw/sub2api:latest
    container_name: sub2api
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - sub2api_data:/app/data
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - RUN_MODE=${RUN_MODE:-standard}
      # PostgreSQL
      - DATABASE_HOST=sub2api-postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
      - DATABASE_SSLMODE=disable
      # Redis
      - REDIS_HOST=sub2api-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      # Admin（首次启动自动创建）
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # JWT / TOTP（留空则每次重启随机生成，会导致登录失效）
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}
      # 时区
      - TZ=${TZ:-Asia/Shanghai}
      # Gemini OAuth（可选）
      - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
      - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
      - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}
      # 安全
      - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}
      # 更新代理（可选）
      - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}
    depends_on:
      sub2api-postgres:
        condition: service_healthy
      sub2api-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL for Sub2API
  # ---------------------------------------------------------------------------
  sub2api-postgres:
    image: postgres:18-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    volumes:
      - sub2api_postgres_data:/var/lib/postgresql/data
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis for Sub2API
  # ---------------------------------------------------------------------------
  sub2api-redis:
    image: redis:8-alpine
    container_name: sub2api-redis
    restart: unless-stopped
    volumes:
      - sub2api_redis_data:/data
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  caddy_data:
  caddy_config:
  sub2api_data:
  sub2api_postgres_data:
  sub2api_redis_data:
