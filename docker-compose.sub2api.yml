# Sub2API 附加栈（与 CLIProxyAPI 等其他上游共存）：
#
# 使用方式（叠加到已有 compose 配置）：
#   docker compose -f docker-compose.yml -f docker-compose.cliproxy.yml -f docker-compose.sub2api.yml up -d --build
#
# 单独使用（Sub2API 作为唯一上游）：
#   docker compose -f docker-compose.yml -f docker-compose.sub2api.yml up -d --build
#   此时需在 .env 中设置 AEGIS_UPSTREAM_BASE_URL=http://sub2api:8080/v1
#
# 与其他上游共存时：
#   Sub2API 通过 Token 路由接入，不覆盖 AEGIS_UPSTREAM_BASE_URL。
#   启动后注册 token：
#     curl -X POST http://127.0.0.1:18080/__gw__/register \
#       -H "Content-Type: application/json" \
#       -d '{"upstream_base":"http://sub2api:8080/v1","api_key":"<sub2api的apikey>"}'
#   返回的 token 用于请求路径：/v1/__gw__/t/<TOKEN>/chat/completions
#
# 链路（Token 路由模式）：
#   客户端 → AegisGate /v1/__gw__/t/<TOKEN>/... → sub2api:8080
#
# 链路（直连模式，单独使用时）：
#   客户端 → Caddy → AegisGate → sub2api:8080

services:
  aegisgate:
    depends_on:
      sub2api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Sub2API：使用官方镜像
  # 官方文档：https://github.com/Wei-Shaw/sub2api
  # 更新：docker compose -f ... pull sub2api && docker compose -f ... up -d
  # ---------------------------------------------------------------------------
  sub2api:
    image: weishaw/sub2api:latest
    container_name: sub2api
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - sub2api_data:/app/data
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - RUN_MODE=${RUN_MODE:-standard}
      # PostgreSQL
      - DATABASE_HOST=sub2api-postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
      - DATABASE_SSLMODE=disable
      # Redis
      - REDIS_HOST=sub2api-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      # Admin（首次启动自动创建）
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # JWT / TOTP（留空则每次重启随机生成，会导致登录失效）
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}
      # 时区
      - TZ=${TZ:-Asia/Shanghai}
      # Gemini OAuth（可选）
      - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
      - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
      - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}
      # 安全
      - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}
      # 更新代理（可选）
      - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}
    depends_on:
      sub2api-postgres:
        condition: service_healthy
      sub2api-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL for Sub2API
  # ---------------------------------------------------------------------------
  sub2api-postgres:
    image: postgres:18-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    volumes:
      - sub2api_postgres_data:/var/lib/postgresql/data
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis for Sub2API
  # ---------------------------------------------------------------------------
  sub2api-redis:
    image: redis:8-alpine
    container_name: sub2api-redis
    restart: unless-stopped
    volumes:
      - sub2api_redis_data:/data
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  sub2api_data:
  sub2api_postgres_data:
  sub2api_redis_data:
